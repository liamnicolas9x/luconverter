<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNA / RNA Converter</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Courier New',monospace;background:#0f1117;color:#e8e8e8;min-height:100vh;padding:2rem 1rem}
.container{max-width:760px;margin:0 auto}
header{margin-bottom:2rem;padding-bottom:1.25rem;border-bottom:1px solid #2a2a3a}
header h1{font-size:24px;font-weight:700;color:#fff;letter-spacing:-0.5px}
header p{font-size:13px;color:#888;margin-top:6px}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;margin-left:8px;vertical-align:middle;letter-spacing:0.5px}
.badge-bio{background:#1a2e1a;color:#4ade80;border:1px solid #2d4d2d}

.input-area{margin-bottom:1rem}
label{display:block;font-size:11px;color:#888;margin-bottom:6px;letter-spacing:0.5px;text-transform:uppercase}
textarea{width:100%;min-height:100px;padding:12px 14px;font-family:'Courier New',monospace;font-size:13px;border:1px solid #2a2a3a;border-radius:8px;background:#161b27;color:#e8e8e8;resize:vertical;line-height:1.8;letter-spacing:0.5px;transition:border-color 0.2s}
textarea:focus{outline:none;border-color:#4f9ef8}
textarea::placeholder{color:#444}
.char-count{text-align:right;font-size:11px;color:#555;margin-top:4px}

.ops-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:1.25rem}
.op-btn{padding:10px 14px;font-size:12px;font-weight:500;border:1px solid #2a2a3a;border-radius:8px;background:#161b27;color:#ccc;cursor:pointer;text-align:left;transition:all 0.15s;font-family:'Courier New',monospace}
.op-btn:hover{border-color:#4f9ef8;color:#fff;background:#1a2035}
.op-btn.active{border-color:#4f9ef8;color:#4f9ef8;background:#0d1a30}
.op-icon{display:block;font-size:18px;margin-bottom:3px}
.op-label{display:block;font-size:12px;font-weight:600}
.op-desc{display:block;font-size:10px;color:#666;margin-top:2px}
.op-btn:hover .op-desc,.op-btn.active .op-desc{color:#4f9ef8;opacity:0.7}

.error{color:#f87171;font-size:12px;margin-top:6px;padding:8px 12px;background:#2a1515;border-radius:6px;border:1px solid #4d1f1f;display:none}

.result-box{background:#161b27;border-radius:10px;border:1px solid #2a2a3a;padding:16px;display:none}
.result-label{font-size:11px;color:#888;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px}
.result-seq{font-family:'Courier New',monospace;font-size:13px;word-break:break-all;line-height:1.9;letter-spacing:0.6px;min-height:40px}
.result-seq .A{color:#fb923c}
.result-seq .T{color:#60a5fa}
.result-seq .U{color:#4ade80}
.result-seq .G{color:#facc15}
.result-seq .C{color:#f472b6}

.divider{border:none;border-top:1px solid #2a2a3a;margin:14px 0}

.result-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.act-btn{font-size:11px;padding:6px 14px;border:1px solid #2a2a3a;border-radius:6px;background:transparent;color:#888;cursor:pointer;transition:all 0.15s;font-family:'Courier New',monospace}
.act-btn:hover{border-color:#4f9ef8;color:#4f9ef8}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:14px}
.stat{background:#0f1117;border-radius:6px;padding:10px;text-align:center;border:1px solid #2a2a3a}
.stat-val{font-size:20px;font-weight:700;display:block}
.stat-lbl{font-size:10px;color:#666;display:block;margin-top:2px;text-transform:uppercase;letter-spacing:0.5px}
.A-stat{color:#fb923c}
.T-stat{color:#60a5fa}
.G-stat{color:#facc15}
.C-stat{color:#f472b6}
.U-stat{color:#4ade80}

.gc-bar{height:6px;border-radius:3px;background:#2a2a3a;margin-top:12px;overflow:hidden}
.gc-fill{height:100%;background:linear-gradient(90deg,#4ade80,#22c55e);border-radius:3px;transition:width 0.4s ease}
.gc-label{font-size:11px;color:#666;margin-top:5px}

.info-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.info-pill{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid #2a2a3a;color:#888;letter-spacing:0.3px}

.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1.25rem;font-size:11px;color:#666}
.leg{display:flex;align-items:center;gap:4px}
.leg-dot{width:8px;height:8px;border-radius:50%;display:inline-block}

footer{margin-top:2rem;padding-top:1rem;border-top:1px solid #2a2a3a;font-size:11px;color:#555;text-align:center}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>DNA / RNA Converter <span class="badge badge-bio">BIOINFORMATICS</span></h1>
    <p>Paste a nucleotide sequence and choose a conversion operation</p>
  </header>

  <div class="legend">
    <span class="leg"><span class="leg-dot" style="background:#fb923c"></span>Adenine (A)</span>
    <span class="leg"><span class="leg-dot" style="background:#60a5fa"></span>Thymine (T)</span>
    <span class="leg"><span class="leg-dot" style="background:#4ade80"></span>Uracil (U)</span>
    <span class="leg"><span class="leg-dot" style="background:#facc15"></span>Guanine (G)</span>
    <span class="leg"><span class="leg-dot" style="background:#f472b6"></span>Cytosine (C)</span>
  </div>

  <div class="input-area">
    <label>Input sequence (DNA or RNA)</label>
    <textarea id="inputSeq" placeholder="Paste your sequence here...&#10;Example: ATGCGATCGATCGAATGC" oninput="onInput()" spellcheck="false"></textarea>
    <div class="char-count" id="charCount">0 bp</div>
  </div>

  <div id="error" class="error"></div>

  <div class="ops-grid">
    <button class="op-btn" onclick="runOp('dna2rna',this)">
      <span class="op-icon">→</span>
      <span class="op-label">DNA → RNA</span>
      <span class="op-desc">Transcription (T→U)</span>
    </button>
    <button class="op-btn" onclick="runOp('rna2dna',this)">
      <span class="op-icon">←</span>
      <span class="op-label">RNA → DNA</span>
      <span class="op-desc">Rev. Transcription (U→T)</span>
    </button>
    <button class="op-btn" onclick="runOp('complement',this)">
      <span class="op-icon">⇌</span>
      <span class="op-label">Complement</span>
      <span class="op-desc">A↔T/U, G↔C</span>
    </button>
    <button class="op-btn" onclick="runOp('reverse',this)">
      <span class="op-icon">↩</span>
      <span class="op-label">Reverse</span>
      <span class="op-desc">Flip sequence 5'→3'</span>
    </button>
    <button class="op-btn" onclick="runOp('revcomp',this)">
      <span class="op-icon">⇔</span>
      <span class="op-label">Rev. Complement</span>
      <span class="op-desc">Reverse + Complement</span>
    </button>
    <button class="op-btn" onclick="runOp('antisense',this)">
      <span class="op-icon">⊖</span>
      <span class="op-label">Antisense</span>
      <span class="op-desc">3'→5' template strand</span>
    </button>
  </div>

  <div class="result-box" id="resultBox">
    <div class="result-label" id="resultLabel">Result</div>
    <div class="result-seq" id="resultSeq"></div>
    <div class="result-actions">
      <button class="act-btn" onclick="copyResult()">📋 Copy</button>
      <button class="act-btn" onclick="useAsInput()">↑ Use as input</button>
      <button class="act-btn" onclick="clearAll()">✕ Clear</button>
    </div>
    <div class="divider"></div>
    <div class="stats" id="statsGrid"></div>
    <div class="gc-bar"><div class="gc-fill" id="gcFill" style="width:0%"></div></div>
    <div class="gc-label" id="gcLabel"></div>
    <div class="info-row" id="infoRow"></div>
  </div>

  <footer>DNA / RNA Converter &mdash; built with ❤️ for biology</footer>
</div>

<script>
let lastResult='';

const OPS={
  dna2rna:'DNA → RNA (Transcription)',
  rna2dna:'RNA → DNA (Reverse Transcription)',
  complement:'Complementary Strand',
  reverse:'Reversed Sequence',
  revcomp:'Reverse Complement',
  antisense:'Antisense Strand',
};

function clean(s){return s.toUpperCase().replace(/\s/g,'');}
function isRNA(s){return s.includes('U');}

function complement(seq){
  return seq.split('').map(b=>{
    if(b==='A') return isRNA(seq)?'U':'T';
    if(b==='T'||b==='U') return 'A';
    if(b==='G') return 'C';
    if(b==='C') return 'G';
    return b;
  }).join('');
}

function validate(seq){
  const inv=seq.replace(/[ATUGCN]/g,'');
  if(inv.length) return 'Invalid characters: '+[...new Set(inv)].join(', ');
  if(seq.includes('T')&&seq.includes('U')) return 'Sequence cannot contain both T (DNA) and U (RNA)';
  return null;
}

function colorize(seq){
  return seq.split('').map(b=>'ATUGC'.includes(b)?`<span class="${b}">${b}</span>`:b).join('');
}

function onInput(){
  const seq=clean(document.getElementById('inputSeq').value);
  document.getElementById('charCount').textContent=seq.length+' bp';
  document.getElementById('error').style.display='none';
  document.getElementById('resultBox').style.display='none';
}

function runOp(op,btn){
  document.querySelectorAll('.op-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const seq=clean(document.getElementById('inputSeq').value);
  if(!seq){showError('Please enter a sequence first.');return;}
  const err=validate(seq);
  if(err){showError(err);return;}
  document.getElementById('error').style.display='none';
  let result='';
  if(op==='dna2rna') result=seq.replace(/T/g,'U');
  else if(op==='rna2dna') result=seq.replace(/U/g,'T');
  else if(op==='complement') result=complement(seq);
  else if(op==='reverse') result=seq.split('').reverse().join('');
  else if(op==='revcomp') result=complement(seq).split('').reverse().join('');
  else if(op==='antisense') result=complement(seq).split('').reverse().join('');
  lastResult=result;
  document.getElementById('resultLabel').textContent=OPS[op];
  document.getElementById('resultSeq').innerHTML=colorize(result);
  const counts={A:0,T:0,U:0,G:0,C:0};
  for(const b of result) if(counts[b]!==undefined) counts[b]++;
  const total=result.length;
  const hasU=result.includes('U');
  const gc=counts.G+counts.C;
  const gcPct=total?Math.round(gc/total*100):0;
  const bases=hasU
    ?[['A',counts.A,'A-stat'],['U',counts.U,'U-stat'],['G',counts.G,'G-stat'],['C',counts.C,'C-stat']]
    :[['A',counts.A,'A-stat'],['T',counts.T,'T-stat'],['G',counts.G,'G-stat'],['C',counts.C,'C-stat']];
  document.getElementById('statsGrid').innerHTML=bases.map(([b,n,c])=>`<div class="stat"><span class="stat-val ${c}">${n}</span><span class="stat-lbl">${b}</span></div>`).join('');
  document.getElementById('gcFill').style.width=gcPct+'%';
  document.getElementById('gcLabel').textContent=`GC content: ${gcPct}% — ${gc} of ${total} bases`;
  const type=hasU?'RNA':'DNA';
  document.getElementById('infoRow').innerHTML=`<span class="info-pill">${total} ${type==='RNA'?'nt':'bp'}</span><span class="info-pill">${type}</span><span class="info-pill">GC ${gcPct}%</span>`;
  document.getElementById('resultBox').style.display='block';
}

function showError(msg){
  const el=document.getElementById('error');
  el.textContent=msg;
  el.style.display='block';
  document.getElementById('resultBox').style.display='none';
}

function copyResult(){
  navigator.clipboard.writeText(lastResult).catch(()=>{});
  const btn=event.currentTarget;
  const orig=btn.textContent;
  btn.textContent='✓ Copied!';
  setTimeout(()=>btn.textContent=orig,1500);
}

function useAsInput(){
  document.getElementById('inputSeq').value=lastResult;
  document.getElementById('charCount').textContent=lastResult.length+' bp';
  document.getElementById('resultBox').style.display='none';
  document.querySelectorAll('.op-btn').forEach(b=>b.classList.remove('active'));
}

function clearAll(){
  document.getElementById('inputSeq').value='';
  document.getElementById('charCount').textContent='0 bp';
  document.getElementById('resultBox').style.display='none';
  document.querySelectorAll('.op-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('error').style.display='none';
}
</script>
</body>
</html>
